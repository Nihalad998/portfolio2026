<section class="relative min-h-screen overflow-hidden pt-24 pb-10 md:pb-0">
  <!-- THREE.JS CANVAS -->

  <!-- DARK OVERLAY -->
  <div class="absolute inset-0 bg-black/20 md:bg-black/30 z-10"></div>

  <!-- HERO CONTENT -->
  <div
    class="relative z-20 min-h-[calc(100vh-96px)] max-w-[1400px] mx-auto px-6 flex items-center"
  >
    <!-- LEFT CONTENT -->
    <div class="w-full xl:w-1/2 text-center xl:text-left">
      <!-- SUBTITLE -->
      <p
        class="hero-subtitle uppercase tracking-[4px] md:tracking-[10px] text-cyan-400 text-xl mb-6"
      >
        Frontend / Angular Developer
      </p>

      <!-- MAIN TITLE -->
      <h1
        class="hero-title text-3xl sm:text-5xl lg:text-6xl xl:text-7xl font-black leading-tight mb-8 text-white"
      >
        Hi, I'm
        <span
          class="bg-gradient-to-r from-cyan-300 via-sky-400 to-fuchsia-500 bg-clip-text text-transparent"
        >
          Nihal Adhikari
        </span>
      </h1>

      <!-- DESCRIPTION -->
      <p
        class="hero-description max-w-xl xl:max-w-2xl text-base sm:text-lg xl:text-2xl text-gray-200 leading-8 xl:leading-10 mb-10 mx-auto xl:mx-0"

        Angular Developer specializing in scalable enterprise applications,
        interactive UI experiences, and performance optimization.
      </p>

      <!-- BUTTONS -->
      <div
        class="hero-buttons flex flex-col sm:flex-row items-center justify-center gap-4 mt-2"
      >
        <!-- BUTTON 1 -->
        <button
          class="px-6 sm:px-8 py-3 sm:py-4 text-sm sm:text-base rounded-full bg-cyan-300 text-black font-bold hover:scale-105"
        >
          View Projects
        </button>

        <!-- BUTTON 2 -->
        <a
          href="assets/resume/Nihal_Resume.pdf"
          download
          class="px-6 sm:px-8 py-3 sm:py-4 text-sm sm:text-base rounded-full border border-cyan-300 text-cyan-300 font-semibold text-center hover:bg-cyan-300 hover:text-black transition"
        >
          Download Resume
        </a>
      </div>
    </div>

    <!-- RIGHT SPACE FOR DESKTOP -->
    <div class="hidden xl:block xl:w-1/2"></div>
  </div>
</section>
