<nav
  class="fixed top-0 left-0 w-full z-[999] bg-[#050816] backdrop-blur-lg border-b border-white/10"
>
  <div
    class="max-w-[1400px] mx-auto px-6 py-4 grid grid-cols-[auto_1fr_auto] items-center"
  >
    <!-- Logo -->
    <a href="#" class="pl-4 lg:pl-12">
      <img src="/Project/NA.png" alt="Nihal Adhikari" class="h-12 w-auto" />
    </a>

    <!-- Desktop Menu -->
    <div class="hidden sm:flex justify-center gap-10 text-gray-300">
      <a href="#about" class="hover:text-cyan-300 transition"> About </a>
      <a href="#projects" class="hover:text-cyan-300 transition"> Projects </a>
      <a href="#skills" class="hover:text-cyan-300 transition"> Skills </a>
      <a href="#contact" class="hover:text-cyan-300 transition"> Contact </a>
    </div>

    <!-- Mobile Toggle -->
    <button
      (click)="toggleMenu()"
      class="sm:hidden justify-self-end text-cyan-300 text-3xl z-40"
    >
      {{ mobileMenuOpen ? "✕" : "☰" }}
    </button>

    <!-- MOBILE MENU -->
    <div
      *ngIf="mobileMenuOpen"
      class="w-full absolute top-full right-0 bg-[#050816]/95 backdrop-blur-xl border-b border-cyan-400/10"
    >
      <div class="flex flex-col items-center py-3 divide-y">
        <a
          href="#about"
          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          About
        </a>
        <a
          href="#projects"
          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          Projects
        </a>
        <a
          href="#skills"
          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          Skills
        </a>
        <a
          href="#contact"
          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          Contact
        </a>
      </div>
    </div>
  </div>
</nav>
