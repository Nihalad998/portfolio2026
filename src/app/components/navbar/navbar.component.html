<nav
  class="fixed top-0 left-0 w-full z-[999] bg-black/20 backdrop-blur-lg border-b border-white/10"
>
  <div
    class="max-w-[1400px] mx-auto px-6 py-4 flex items-center justify-between"
  >
    <a href="#">
      <img src="/Project/NA.png" alt="Nihal Adhikari" class="h-12 w-auto" />
    </a>
    <!-- Desktop Menu -->
    <div class="hidden sm:flex gap-8 text-gray-300">
      <a href="#about" class="hover:text-cyan-300 transition"> About </a>
      <a href="#skills" class="hover:text-cyan-300 transition"> Skills </a>
      <a href="#projects" class="hover:text-cyan-300 transition"> Projects </a>
      <a href="#contact" class="hover:text-cyan-300 transition"> Contact </a>
    </div>
    <!-- Mobile Menu -->
    <button (click)="toggleMenu()" class="sm:hidden text-cyan-300 text-3xl">
      {{ mobileMenuOpen ? "✕" : "☰" }}

    <!-- MOBILE MENU -->

    <div
      *ngIf="mobileMenuOpen"

    >
      <div class="flex flex-col items-center py-3 divide-y">
        <a

          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"

        </a>
        <a
          href="#skills"

          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          Skills
        </a>
        <a
          href="#projects"
          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          Projects
        </a>
        <a
          href="#contact"
          (click)="closeMenu()"
          class="w-full text-center py-3 hover:bg-cyan-400/10 hover:text-cyan-300 transition"
        >
          Contact
        </a>
      </div>
    </div>
  </div>
